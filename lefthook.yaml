assert_lefthook_installed: true
colors: false
source_dir: scripts/

output:
  - summary
  - failure
  - execution

commit-msg:
  commands:
    'lint commit message':
      run: pnpm exec commitlint --edit {1}

pre-commit:
  skip:
    - merge
    - rebase

  commands:
    knip:
      glob: '{package.json,**/package.json,pnpm-lock.yaml}'
      priority: 1
      run: pnpm exec knip --no-config-hints && bash -c 'shopt -s nullglob; files=(packages/*/knip.json); if [ ${#files[@]} -gt 0 ]; then for file in "${files[@]}"; do cd "$(dirname "${file}")" && pnpm exec knip --no-config-hints; done; else echo "No files found."; fi'

    ls-lint:
      priority: 1
      run: pnpm run ls-lint

    syncpack:
      glob: '{package.json,**/package.json,pnpm-lock.yaml}'
      priority: 2
      run: pnpm run syncpack
      stage_fixed: true

    pnpm-install:
      glob: '{package.json,**/package.json,pnpm-lock.yaml}'
      priority: 3
      run: pnpm install
      stage_fixed: true

    eslint:
      exclude:
        - pnpm-lock.yaml
        - vendor/**
        - packages/*/vendor/**
      glob: '*.{js,mjs,cjs,ts,mts,cts,yml,yaml,json,toml}'
      priority: 4
      run: |
        bash -c '
          shopt -s nullglob
          set -euo pipefail

          directory="$PWD"
          files=("$@")
          config_files=("eslint.config.mjs")
          configs=()

          for config_file in "${config_files[@]}"; do
            if [[ -f "${directory}/${config_file}" ]]; then
              configs+=("${directory}/${config_file}")
            fi

            configs+=("${directory}"/packages/*/${config_file})
          done

          for config in "${configs[@]}"; do
            cd "$(dirname "${config}")"
            config_dir="$(dirname "${config}")"

            # Filter files that exist in current directory
            local_files=()
            for file in "${files[@]}"; do
              file_dir="$(dirname "${directory}/${file}")"
              if [[ "${file_dir}" == "${config_dir}" ]]; then
                local_files+=("${directory}/${file}")
              fi
            done

            if [[ ${#local_files[@]} -gt 0 ]]; then
              pnpm exec eslint --flag unstable_config_lookup_from_file --no-warn-ignored --fix "${local_files[@]}"
            fi
          done
        ' -- {staged_files}
      stage_fixed: true

    prettier:
      exclude:
        - pnpm-lock.yaml
        - vendor/**
        - packages/*/vendor/**
      glob: '*.{js,mjs,cjs,ts,mts,cts,yml,yaml,json,md}'
      priority: 5
      run: |
        bash -c '
          shopt -s nullglob
          set -euo pipefail

          directory="$PWD"
          files=("$@")
          config_files=(".prettierrc.json")
          configs=()

          for config_file in "${config_files[@]}"; do
            if [[ -f "${directory}/${config_file}" ]]; then
              configs+=("${directory}/${config_file}")
            fi

            configs+=("${directory}"/packages/*/${config_file})
          done

          for config in "${configs[@]}"; do
            cd "$(dirname "${config}")"
            config_dir="$(dirname "${config}")"

            # Filter files that exist in current directory
            local_files=()
            for file in "${files[@]}"; do
              file_dir="$(dirname "${directory}/${file}")"
              if [[ "${file_dir}" == "${config_dir}" ]]; then
                local_files+=("${directory}/${file}")
              fi
            done

            if [[ ${#local_files[@]} -gt 0 ]]; then
              pnpm exec prettier --write "${local_files[@]}"
            fi
          done
        ' -- {staged_files}
      stage_fixed: true

    typecheck:
      priority: 6
      run: pnpm run typecheck

    test:
      priority: 7
      run: pnpm run test
