comment: false
github_checks:
  annotations: true

coverage:
  precision: 2
  range: '20...60'
  round: down
  status:
    changes: false
    patch:
      default:
        informational: true
    project:
      default:
        target: auto
        threshold: 5%

flags:
  breeze:
    paths:
      - packages/breeze/
  caslon:
    paths:
      - packages/caslon/
  cepheus:
    paths:
      - packages/cepheus/
  i18n:
    paths:
      - packages/i18n/
  reset:
    paths:
      - packages/reset/
  service-worker:
    paths:
      - packages/service-worker/
  utilities:
    paths:
      - packages/utilities/
  utopia:
    paths:
      - packages/utopia/
  vite:
    paths:
      - packages/vite/
